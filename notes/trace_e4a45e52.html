result.bugs)\n    log(`${bugs.length} found, ${Math.round(budget.remaining()/1000)}k remaining`)\n  }\n\nComposing patterns — exhaustive review (find → dedup vs seen → diverse-lens panel → loop-until-dry):\n  const seen = new Set(), confirmed = []\n  let dry = 0\n  while (dry < 2) {                                              // loop-until-dry\n    const found = (await parallel(FINDERS.map(f => () =>          // barrier: collect all finders this round\n      agent(f.prompt, {phase: 'Find', schema: BUGS})))).filter(Boolean).flatMap(r => r.bugs)\n    const fresh = found.filter(b => !seen.has(key(b)))           // dedup vs ALL seen — plain code, not an agent\n    if (!fresh.length) { dry++; continue }\n    dry = 0; fresh.forEach(b => seen.add(key(b)))\n    const judged = await parallel(fresh.map(b => () =>           // every fresh bug judged concurrently...\n      parallel(['correctness','security','repro'].map(lens => () =>   // ...each by 3 distinct lenses\n        agent(`Judge \"${b.desc}\" via the ${lens} lens — real?`, {phase: 'Verify', schema: VERDICT})))\n        .then(vs => ({ b, real: vs.filter(Boolean).filter(v => v.real).length >= 2 }))))\n    confirmed.push(...judged.filter(v => v.real).map(v => v.b))\n  }\n  return confirmed\n  // dedup vs `seen`, NOT `confirmed` — else judge-rejected findings reappear every round and it never converges.\n\nQuality patterns — common shapes; pick by task and compose freely:\n- Adversarial verify: spawn N independent skeptics per finding, each prompted to REFUTE. Kill if ≥majority refute. Prevents plausible-but-wrong findings from surviving.\n    const votes = await parallel(Array.from({length: 3}, () => () =>\n      agent(`Try to refute: ${claim}. Default to refuted=true if uncertain.`, {schema: VERDICT})))\n    const survives = votes.filter(Boolean).filter(v => !v.refuted).length >= 2\n- Perspective-diverse verify: when a finding can fail in more than one way, give each verifier a distinct lens (correctness, security, perf, does-it-reproduce) instead of N identical refuters — diversity catches failure modes redundancy can't.\n- Judge panel: generate N independent attempts from different angles (e.g. MVP-first, risk-first, user-first), score with parallel judges, synthesize from the winner while grafting the best ideas from runners-up. Beats one-attempt-iterated when the solution space is wide.\n- Loop-until-dry: for unknown-size discovery (bugs, issues, edge cases), keep spawning finders until K consecutive rounds return nothing new. Simple counters (while count < N) miss the tail.\n- Multi-modal sweep: parallel agents each searching a different way (by-container, by-content, by-entity, by-time). Each is blind to what the others surface; useful when one search angle won't find everything.\n- Completeness critic: a final agent that asks \"what's missing — modality not run, claim unverified, source unread?\" What it finds becomes the next round of work.\n- No silent caps: if a workflow bounds coverage (top-N, no-retry, sampling), `log()` what was dropped — silent truncation reads as \"covered everything\" when it didn't.\n\nScale to what the user asked for. \"find any bugs\" → a few finders, single-vote verify. \"thoroughly audit this\" or \"be comprehensive\" → larger finder pool, 3–5 vote adversarial pass, synthesis stage. When unsure, lean toward thoroughness for research/review/audit requests and toward brevity for quick checks.\n\nThese patterns aren't exhaustive — compose novel harnesses when the task calls for it (tournament brackets, self-repair loops, staged escalation, whatever fits).\n\nUse this tool for multi-step orchestration where control flow should be deterministic (loops, conditionals, fan-out) rather than model-driven.\n\n## Resume\n\nThe tool result includes a runId. To resume after a pause, kill, or script edit, relaunch with Workflow({scriptPath, resumeFromRunId}) — the longest unchanged prefix of agent() calls returns cached results instantly; the first edited/new call and everything after it runs live. Same script + same args → 100% cache hit. Date.now()/Math.random()/new Date() are unavailable in scripts (they would break this) — stamp results after the workflow returns, or pass timestamps via args. Fallback when no journal is available: Read agent-<id>.jsonl files in the transcript directory and hand-author a continuation script.","input_schema":{"$schema":"https://json-schema.org/draft/2020-12/schema","type":"object","properties":{"script":{"description":"Self-contained workflow script. Must begin with `export const meta = { name, description, phases }` (pure literal, no computed values) followed by the script body using agent()/parallel()/pipeline()/phase().","type":"string","maxLength":524288},"name":{"description":"Name of a predefined workflow (built-in or from .claude/workflows/). Resolves to a self-contained script.","type":"string"},"description":{"description":"Ignored — set the workflow description in the script's `meta` block.","type":"string"},"title":{"description":"Ignored — set the workflow title in the script's `meta` block.","type":"string"},"args":{"description":"Optional input value exposed to the script as the global `args`, verbatim. Pass arrays/objects as actual JSON values, NOT as a JSON-encoded string — a stringified list breaks `args.filter`/`args.map` in the script. Use for parameterized named workflows (e.g. a research question)."},"scriptPath":{"description":"Path to a workflow script file on disk. Every Workflow invocation persists its script under the session directory and returns the path in the tool result. To iterate, edit that file with Write/Edit and re-invoke Workflow with the same `scriptPath` instead of re-sending the full script. Takes precedence over `script` and `name`.","type":"string"},"resumeFromRunId":{"description":"Run ID of a prior Workflow invocation to resume from. Completed agent() calls with unchanged (prompt, opts) return their cached results instantly; only edited or new calls re-run. Same-session only. Stop the prior run first (TaskStop) before resuming.","type":"string","pattern":"^wf_[a-z0-9-]{6,}$"}},"additionalProperties":false}},{"name":"Write","description":"Writes a file to the local filesystem, overwriting if one exists.\n\nWhen to use: creating a new file, or fully replacing one you've already Read. Overwriting an existing file you haven't Read will fail. For partial changes, use Edit instead.","input_schema":{"$schema":"https://json-schema.org/draft/2020-12/schema","type":"object","properties":{"file_path":{"description":"The absolute path to the file to write (must be absolute, not relative)","type":"string"},"content":{"description":"The content to write to the file","type":"string"}},"required":["file_path","content"],"additionalProperties":false}},{"name":"mcp__context7__query-docs","description":"Retrieves and queries up-to-date documentation and code examples from Context7 for any programming library or framework.\n\nYou must call 'Resolve Context7 Library ID' tool first to obtain the exact Context7-compatible library ID required to use this tool, UNLESS the user explicitly provides a library ID in the format '/org/project' or '/org/project/version' in their query.\n\nDo not call this tool more than 3 times per question.","input_schema":{"type":"object","properties":{"libraryId":{"type":"string","description":"Exact Context7-compatible library ID (e.g., '/mongodb/docs', '/vercel/next.js', '/supabase/supabase', '/vercel/next.js/v14.3.0-canary.87') retrieved from 'resolve-library-id' or directly from user query in the format '/org/project' or '/org/project/version'."},"query":{"type":"string","description":"The question or task you need help with. Be specific and include relevant details. Good: 'How to set up authentication with JWT in Express.js' or 'React useEffect cleanup function examples'. Bad: 'auth' or 'hooks'. The query is sent to the Context7 API for processing. Do not include any sensitive or confidential information such as API keys, passwords, credentials, personal data, or proprietary code in your query."}},"required":["libraryId","query"],"$schema":"http://json-schema.org/draft-07/schema#"}},{"name":"mcp__context7__resolve-library-id","description":"Resolves a package/product name to a Context7-compatible library ID and returns matching libraries.\n\nYou MUST call this function before 'Query Documentation' tool to obtain a valid Context7-compatible library ID UNLESS the user explicitly provides a library ID in the format '/org/project' or '/org/project/version' in their query.\n\nEach result includes:\n- Library ID: Context7-compatible identifier (format: /org/project)\n- Name: Library or package name\n- Description: Short summary\n- Code Snippets: Number of available code examples\n- Source Reputation: Authority indicator (High, Medium, Low, or Unknown)\n- Benchmark Score: Quality indicator (100 is the highest score)\n- Versions: List of versions if available. Use one of those versions if the user provides a version in their query. The format of the version is /org/project/version.\n\nFor best results, select libraries based on name match, source reputation, snippet coverage, benchmark score, and relevance to your use case.\n\nSelection Process:\n1. Analyze the query to understand what library/package the user is looking for\n2. Return the most relevant match based on:\n- Name similarity to the query (exact matches prioritized)\n- Description relevance to the query's intent\n- Documentation coverage (prioritize libraries with higher Code Snippet counts)\n- Source reputation (consider libraries with High or Medium reputation more authoritative)\n- Benchmark Score: Quality indicator (100 is the highest score)\n\nResponse Format:\n- Return the selected library ID in a clearly marked section\n- Provide a brief explanation for why this library was chosen\n- If multiple good matches exist, acknowledge this but proceed with the most relevant one\n- If no good matches exist, clearly state this and suggest query refinements\n\nFor ambiguous queries, request clarification before proceeding with a best-guess match.\n\nIMPORTANT: Do not call this tool more than 3 times per question. If you cannot find what you need after 3 calls, use the best result you have.","input_schema":{"type":"object","properties":{"query":{"type":"string","description":"The question or task you need help with. This is used to rank library results by relevance to what the user is trying to accomplish. The query is sent to the Context7 API for processing. Do not include any sensitive or confidential information such as API keys, passwords, credentials, personal data, or proprietary code in your query."},"libraryName":{"type":"string","description":"Library name to search for and retrieve a Context7-compatible library ID. Use the official library name with proper punctuation — e.g., 'Next.js' instead of 'nextjs', 'Customer.io' instead of 'customerio', 'Three.js' instead of 'threejs'."}},"required":["query","libraryName"],"$schema":"http://json-schema.org/draft-07/schema#"}},{"name":"mcp__open-websearch__fetchCsdnArticle","description":"Fetch full article content from a csdn post URL","input_schema":{"type":"object","properties":{"url":{"type":"string","format":"uri"}},"required":["url"],"additionalProperties":false,"$schema":"http://json-schema.org/draft-07/schema#"}},{"name":"mcp__open-websearch__fetchGithubReadme","description":"Fetch README content from a GitHub repository URL","input_schema":{"type":"object","properties":{"url":{"type":"string","minLength":1}},"required":["url"],"additionalProperties":false,"$schema":"http://json-schema.org/draft-07/schema#"}},{"name":"mcp__open-websearch__fetchJuejinArticle","description":"Fetch full article content from a Juejin(掘金) post URL","input_schema":{"type":"object","properties":{"url":{"type":"string","format":"uri"}},"required":["url"],"additionalProperties":false,"$schema":"http://json-schema.org/draft-07/schema#"}},{"name":"mcp__open-websearch__fetchLinuxDoArticle","description":"Fetch full article content from a linux.do post URL","input_schema":{"type":"object","properties":{"url":{"type":"string","format":"uri"}},"required":["url"],"additionalProperties":false,"$schema":"http://json-schema.org/draft-07/schema#"}},{"name":"mcp__open-websearch__fetchWebContent","description":"Fetch content from a public HTTP(S) URL (supports Markdown files and normal web pages)","input_schema":{"type":"object","properties":{"url":{"type":"string","format":"uri"},"maxChars":{"type":"integer","minimum":1000,"maximum":200000,"default":30000},"readability":{"type":"boolean"},"includeLinks":{"type":"boolean"}},"required":["url"],"additionalProperties":false,"$schema":"http://json-schema.org/draft-07/schema#"}},{"name":"mcp__open-websearch__search","description":"Search the web using these engines: Bing, Csdn, Juejin(掘金), Brave, Duckduckgo, Startpage (no API key required). searchMode meanings: omit or set auto to use the server configured SEARCH_MODE; request forces request-based search; playwright forces browser-based search.","input_schema":{"type":"object","properties":{"query":{"type":"string","minLength":1},"limit":{"type":"number","minimum":1,"maximum":50,"default":10},"searchMode":{"type":"string","enum":["request","auto","playwright"]},"engines":{"type":"array","items":{"type":"string","minLength":1},"minItems":1,"default":["duckduckgo"]}},"required":["query"],"additionalProperties":false,"$schema":"http://json-schema.org/draft-07/schema#"}}],"metadata":{"user_id":"claude_tap_7e2d92bab7a2e9a7a8b94f83"},"max_tokens":32000,"thinking":{"type":"adaptive"},"context_management":{"edits":[{"type":"clear_thinking_20251015","keep":"all"}]},"output_config":{"effort":"high"},"stream":true}},"response":{"status":200,"headers":{"Server":"openresty","Content-Type":"text/event-stream; charset=utf-8","Vary":"origin, access-control-request-method, access-control-request-headers","Access-Control-Allow function initFileDropZone() {
  const dropInner = $('#drop-inner'), fileInput = $('#file-input');
  if (!dropInner || !fileInput || dropInner.dataset.fileDropInitialized === 'true') return;
  dropInner.dataset.fileDropInitialized = 'true';
  ['dragover','dragenter'].forEach(e => dropInner.addEventListener(e, ev => {
    ev.preventDefault();
    dropInner.classList.add('dragover');
  }));
  ['dragleave','drop'].forEach(e => dropInner.addEventListener(e, () => dropInner.classList.remove('dragover')));
  dropInner.addEventListener('drop', ev => {
    ev.preventDefault();
    if (ev.dataTransfer.files.length) loadFile(ev.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) loadFile(fileInput.files[0]);
  });
}

let liveEventSource = null;
let liveConnected = false;
let currentDetailRequestId = null;
let liveRecords = [];
let viewingDate = null; // null = live, string = historical date
let liveRenderTimer = null;
const liveSeenIds = new Set();

function initLiveMode() {
  const statusEl = $('#live-status');
  statusEl.style.display = 'flex';
  updateLiveStatus('connecting');

  liveEventSource = new EventSource('/events');

  liveEventSource.onopen = () => {
    liveConnected = true;
    updateLiveStatus('connected', liveRecords.length);
  };

  liveEventSource.onmessage = (event) => {
    try {
      const record = JSON.parse(event.data);
      // Deduplicate: SSE replays full history on each reconnect
      const id = record.request_id || record.req_id;
      if (id && liveSeenIds.has(id)) return;
      if (id) liveSeenIds.add(id);

      liveRecords.push(record);
      if (!viewingDate) {
        entries.push(...expandLiveWebSocketResponseEntries([record]));
        updateLiveStatus('connected', entries.length);
        clearTimeout(liveRenderTimer);
        liveRenderTimer = setTimeout(() => renderApp(true), 50);
      }
    } catch (e) {
      console.error('Failed to parse SSE data:', e);
    }
  };

  // EventSource auto-reconnects on transient errors;
  // only update status indicator here.
  liveEventSource.onerror = () => {
    liveConnected = false;
    updateLiveStatus('disconnected');
  };
}

function updateLiveStatus(status, count) {
  const el = $('#live-status');
  if (!el) return;
  const colors = {
    connecting: { bg: 'var(--amber-bg)', color: 'var(--amber)', dot: 'var(--amber)' },
    connected: { bg: 'var(--green-bg)', color: 'var(--green)', dot: 'var(--green)' },
    disconnected: { bg: 'var(--red-bg)', color: 'var(--red)', dot: 'var(--red)' }
  };
  const c = colors[status] || colors.connecting;
  const labels = { connecting: 'Connecting...', connected: 'Live', disconnected: 'Disconnected' };
  const countText = count !== undefined ? ` (${count})` : '';
  el.style.background = c.bg;
  el.style.color = c.color;
  el.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${c.dot};${status === 'connected' ? 'animation:pulse 2s infinite;' : ''}"></span>${labels[status]}${countText}`;
}

async function fetchDates(preferredValue = null) {
  try {
    const resp = await fetch('/api/dates');
    const data = await resp.json();
    const sel = $('#date-select');
    if (!sel || !data.dates) return;
    const previous = preferredValue || sel.value || 'live';
    sel.innerHTML = '<option value="live">Live (current session)</option>';
    for (const d of data.dates) {
      sel.insertAdjacentHTML('beforeend', `<option value="${d}">${d}</option>`);
    }
    if (data.has_legacy) {
      sel.insertAdjacentHTML('beforeend', '<option value="legacy">Legacy (flat)</option>');
    }
    if ([...sel.options].some(option => option.value === previous)) sel.value = previous;
    const picker = $('#date-picker');
    if (picker) picker.style.display = 'flex';
    updateHistoryDeleteButton();
  } catch (e) {
    console.error('Failed to fetch dates:', e);
  }
}

async function onDateChange(value) {
  setHistoryDeleteStatus('');
  updateHistoryDeleteButton();
  if (value === 'live') {
    viewingDate = null;
    activePaths.clear();
    entries = expandLiveWebSocketResponseEntries(liveRecords.slice(), true);
    if (entries.length) renderApp(true);
    else renderLiveWaitingState();
    return;
  }
  viewingDate = value;
  try {
    const resp = await fetch('/api/traces/' + encodeURIComponent(value));
    activePaths.clear();
    entries = expandWebSocketResponseEntries(await resp.json());
    renderApp();
  } catch (e) {
    console.error('Failed to load traces for date:', value, e);
  }
}

async function deleteSelectedTraceDate() {
  const sel = $('#date-select');
  if (!sel || !sel.value || sel.value === 'live') return;
  const value = sel.value;
  const label = sel.options[sel.selectedIndex]?.textContent || value;
  if (!window.confirm(formatText('history_delete_confirm', { date: label }))) return;

  const btn = $('#history-delete-btn');
  if (btn) btn.disabled = true;
  setHistoryDeleteStatus(t('history_delete_working'), 'warn');
  try {
    const resp = await fetch('/api/traces/' + encodeURIComponent(value), { method: 'DELETE' });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.error || resp.statusText || String(resp.status));

    const deleted = Number(data.deleted_files || 0);
    setHistoryDeleteStatus(
      deleted > 0
        ? formatText('history_delete_done', { count: deleted })
        : formatText('history_delete_empty', { date: label }),
      deleted > 0 ? 'ok' : 'warn'
    );
    await fetchDates('live');
    viewingDate = null;
    activePaths.clear();
    entries = expandLiveWebSocketResponseEntries(liveRecords.slice(), true);
    if (entries.length) renderApp(true);
    else renderLiveWaitingState();
  } catch (e) {
    console.error('Failed to delete trace history:', value, e);
    setHistoryDeleteStatus(formatText('history_delete_failed', { error: e.message || e }), 'error');
  } finally {
    updateHistoryDeleteButton();
  }
}

function isCompactBlobRef(value) {
  return value &&
    typeof value === 'object' &&
    !Array.isArray(value) &&
    Object.keys(value).length === 1 &&
    value.__claude_tap_blob_ref__ &&
    value.__claude_tap_blob_ref__.version === 1 &&
    value.__claude_tap_blob_ref__.kind === 'json' &&
    typeof value.__claude_tap_blob_ref__.hash === 'string';
}

function materializeCompactValue(value, blobs, cache) {
  if (isCompactBlobRef(value)) {
    const ref = value.__claude_tap_blob_ref__;
    if (!cache.has(ref.hash)) {
      const blob = blobs[ref.hash];
      if (!blob || blob.kind !== (ref.kind || 'json')) throw new Error(`Missing compact trace blob: ${ref.hash}`);
      cache.set(ref.hash, blob.payload);
    }
    return cache.get(ref.hash);
  }
  if (Array.isArray(value)) return value.map(item => materializeCompactValue(item, blobs, cache));
  if (value && typeof value === 'object') {
    const out = {};
    for (const [key, item] of Object.entries(value)) out[key] = materializeCompactValue(item, blobs, cache);
    return out;
  }
  return value;
}

function materializeCompactRecord(payload, blobs, cache) {
  if (!payload || typeof payload !== 'object' || Array.isArray(payload)) return null;
  const marker = payload.__claude_tap_compact_record__;
  if (!marker) return payload;
  if (marker.version !== 1) throw new Error(`Unsupported compact trace record version: ${marker.version}`);
  const record = materializeCompactValue(payload.record, blobs, cache);
  return record && typeof record === 'object' && !Array.isArray(record) ? record : null;
}

function materializeCompactTraceBundle(bundle) {
  const marker = bundle && typeof bundle === 'object' ? bundle.__claude_tap_compact_trace__ : null;
  if (!marker) return null;
  if (marker.version !== 1) throw new Error(`Unsupported compact trace bundle version: ${marker.version}`);
  const records = Array.isArray(bundle.records) ? bundle.records : [];
  const blobs = bundle.blobs && typeof bundle.blobs === 'object' ? bundle.blobs : {};
  const cache = new Map();
  return records.map(record => materializeCompactRecord(record, blobs, cache)).filter(Boolean);
}

function parseTraceText(text) {
  const trimmed = text.trim();
  if (!trimmed) return [];
  try {
    const parsed = JSON.parse(trimmed);
    const compactRecords = materializeCompactTraceBundle(parsed);
    if (compactRecords) return compactRecords;
    if (Array.isArray(parsed)) return parsed.filter(item => item && typeof item === 'object' && !Array.isArray(item));
  } catch {
    // Fall through to JSONL parsing.
  }
  return trimmed.split('\n').map(line => {
    try { return JSON.parse(line); } catch { return null; }
  }).filter(Boolean);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    entries = expandWebSocketResponseEntries(parseTraceText(reader.result));
    if (!entries.length) { alert('No valid entries found / 未找到有效条目'); return; }
    renderApp();
  };
  reader.readAsText(file);
}

function getPath(e) { return (e.request?.path || '/unknown').replace(/\?.*$/, ''); }

function renderApp(preserveDetail) {
  $('#drop-zone').style.display = 'none';
  $('#sidebar-wrap').style.display = 'flex';
  $('#search-bar').style.display = '';
  $('#sidebar-sort').style.display = '';

  $('#sidebar').style.display = '';
  $('#detail').style.display = '';
  $('#stats').style.display = '';
  $('#path-filter').style.display = '';
  const pathCounts = {};
  entries.forEach(e => { const p = getPath(e); pathCounts[p] = (pathCounts[p] || 0) + 1; });
  const paths = Object.keys(pathCounts).sort();
  if (activePaths.size === 0) {
    /* If the trace has main conversation paths, hide auxiliary setup calls by default. */
    const primaryPaths = paths.filter(isPathPrimary);
    if (primaryPaths.length > 0) primaryPaths.forEach(p => activePaths.add(p));
    else paths.forEach(p => activePaths.add(p));
  }
  renderPathFilter(paths, pathCounts);
  renderTracePathBar();
  applyFilter(preserveDetail);
}

}

function fallbackCopyText(text) {
  return new Promise((resolve, reject) => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      ta.style.left = '-9999px';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) resolve();
      else reject(new Error('execCommand(copy) failed'));
    } catch (err) {
      reject(err);
    }
  });
}

function writeClipboardText(text) {
  if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopyText(text));
  }
  return fallbackCopyText(text);
}

function copyToClipboard(text, btn, copiedLabel = null) {
  writeClipboardText(text).then(() => {
    onCopySuccess(btn, copiedLabel);
  }).catch(err => {
    console.error('Clipboard copy failed:', err);
    if (!btn) return;
    const orig = btn.innerHTML;
    btn.textContent = '!';
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  });
}

let pathFilterExpanded = false;

/*
 * Path priority tiers:
 *   primary   – core AI conversation endpoints, always visible
 *   secondary – useful auxiliary APIs (MCP, models, token counting), collapsed behind "+N more"
 *   noise     – plugin manifests, bot APIs, asset downloads, version checks — hidden by default
 */
const PRIMARY_PATH_PREFIXES = ['/v1/messages', '/v1/responses', '/backend-api/codex/responses', '/v1/chat/completions', '/v1/completions', '/v1internal:generateContent', '/v1internal:streamGenerateContent'];
const SECONDARY_PATH_PREFIXES = ['/v1/mcp', '/v1/models', '/v1/embeddings', '/v1/files', '/responses', '/models', '/chat/completions', '/completions', '/files', '/search', '/fetch', '/usages', '/feedback'];
function isBedrockInvokePath(p) {
  return p.startsWith('/model/') && (p.endsWith('/invoke') || p.endsWith('/invoke-with-response-stream'));
}
function pathTier(p) {
  if (isBedrockInvokePath(p)) return 0;
  if (PRIMARY_PATH_PREFIXES.some(pfx => p.startsWith(pfx))) return 0;
  if (SECONDARY_PATH_PREFIXES.some(pfx => p.startsWith(pfx))) return 1;
  return 2;
}
function isPathPrimary(p) { return pathTier(p) === 0; }

function renderPathFilter(paths, pathCounts) {
  const c = $('#path-filter'); c.innerHTML = '';
  const buckets = [[], [], []]; /* primary, secondary, noise */
  paths.forEach(p => buckets[pathTier(p)].push(p));
  buckets.forEach(b => b.sort((a, bb) => pathCounts[bb] - pathCounts[a]));

  /* Always show primary */
  buckets[0].forEach(p => c.appendChild(makeFilterChip(p, pathCounts[p])));

  const hiddenPaths = [...buckets[1], ...buckets[2]];
  if (hiddenPaths.length > 0) {
    if (pathFilterExpanded) {
      buckets[1].forEach(p => c.appendChild(makeFilterChip(p, pathCounts[p])));
      buckets[2].forEach(p => c.appendChild(makeFilterChip(p, pathCounts[p])));
    }
    const toggle = document.createElement('button');
    toggle.className = 'filter-chip-toggle';
    toggle.textContent = pathFilterExpanded ? t('filter_less') : `+${hiddenPaths.length} ${t('filter_more')}`;
    toggle.onclick = () => { pathFilterExpanded = !pathFilterExpanded; renderPathFilter(paths, pathCounts); };
    c.appendChild(toggle);
  }
}

function makeFilterChip(p, count) {
  const chip = document.createElement('button');
  chip.className = 'filter-chip' + (activePaths.has(p) ? ' active' : '');
  /* Truncate long paths: show last 40 chars with ellipsis */
  const label = p.length > 40 ? '\u2026' + p.slice(-39) : p;
  chip.innerHTML = `<span title="${esc(p)}">${esc(label)}</span><span class="chip-count">${count}</span>`;
  chip.title = p;
  chip.onclick = () => {
    if (activePaths.has(p)) activePaths.delete(p); else activePaths.add(p);
    if (activePaths.size === 0) activePaths.add(p);
    chip.classList.toggle('active');
    applyFilter();
  };
  return chip;
}

function turnSortSegments(value) {
  if (value === undefined || value === null || value === '') return [0];
  return String(value).split('.').map(part => {
    const num = Number(part);
    return Number.isFinite(num) ? num : 0;
  });
}

function compareTurns(a, b) {
  const aa = turnSortSegments(a);
  const bb = turnSortSegments(b);
  const len = Math.max(aa.length, bb.length);
  for (let i = 0; i < len; i++) {
    const diff = (aa[i] || 0) - (bb[i] || 0);
    if (diff) return diff;
  }
  return String(a ?? '').localeCompare(String(b ?? ''));
}

function applyFilter(preserveDetail) {
  filtered = entries.filter(e => activePaths.has(getPath(e)));
  if (searchQuery) filtered = filtered.filter(e => matchSearch(e, searchQuery));
  if (activeTools) {
    filtered = filtered.filter(e => {
      const ro = getResponseOutput(e);
      const rc = ro?.content;
      if (!Array.isArray(rc)) return false;
      return rc.some(b => b.type === 'tool_use' && activeTools.has(b.name));
    });
  }
  filtered.sort((a, b) => compareTurns(a.turn, b.turn));
  let totalTokens = 0, totalDuration = 0;
  let sumInput = 0, sumOutput = 0, sumCacheRead = 0, sumCacheCreate = 0;
  filtered.forEach(e => {
    totalDuration += e.duration_ms || 0;
    const u = getUsage(e);
    if (u) {
      totalTokens += (u.input_tokens || 0) + (u.output_tokens || 0);
      sumInput += u.input_tokens || 0;
      sumOutput += u.output_tokens || 0;
      sumCacheRead += u.cache_read_input_tokens || 0;
      sumCacheCreate += u.cache_creation_input_tokens || 0;
    }
  });
  $('#stat-turns').textContent = filtered.length;
  $('#stat-tokens').textContent = totalTokens.toLocaleString();
  $('#stat-duration').textContent = fmtDuration(totalDuration);
  // Token breakdown in header
  if (totalTokens > 0) {
    $('#stat-input').textContent = sumInput.toLocaleString();
    $('#stat-input-group').style.display = 'flex';
    $('#stat-output').textContent = sumOutput.toLocaleString();
    $('#stat-output-group').style.display = 'flex';
    if (sumCacheRead) { $('#stat-cache-read').textContent = sumCacheRead.toLocaleString(); $('#stat-cache-read-group').style.display = 'flex'; }
    else { $('#stat-cache-read-group').style.display = 'none'; }
    if (sumCacheCreate) { $('#stat-cache-write').textContent = sumCacheCreate.toLocaleString(); $('#stat-cache-write-group').style.display = 'flex'; }
    else { $('#stat-cache-write-group').style.display = 'none'; }
  } else {
    ['stat-input-group','stat-output-group','stat-cache-read-group','stat-cache-write-group'].forEach(id => $('#'+id).style.display = 'none');
  }
  renderToolFilter();
  renderSidebar(preserveDetail);
  updatePositionIndicator();
}

function renderToolFilter() {
  const tf = $('#tool-filter');
  // Collect all tool names from all entries (not just filtered)
  const toolSet = new Set();
  entries.forEach(e => {
    if (e._isStub) {
      // Use stub's response content (already has tool_use blocks from metadata)
      const rc = e.response?.body?.content;
      if (Array.isArray(rc)) rc.forEach(b => { if (b.type === 'tool_use' && b.name) toolSet.add(b.name); });
    } else {
      const ro = getResponseOutput(e);
      const rc = ro?.content;
      if (Array.isArray(rc)) rc.forEach(b => { if (b.type === 'tool_use' && b.name) toolSet.add(b.name); });
    }
  });
  if (toolSet.size === 0) { tf.style.display = 'none'; return; }
  tf.style.display = '';
  const tools = [...toolSet].sort();
  tf.innerHTML = '<div style="margin-bottom:3px;font-weight:600;color:var(--text-secondary)">Tools</div>' +
    tools.map(name => {
      const active = activeTools ? activeTools.has(name) : false;
      return `<button class="filter-chip${active ? ' active' : ''}" style="font-size:10px;padding:2px 6px;margin:1px" onclick="toggleToolFilter('${name.replace(/'/g, "\\'")}')">${name}</button>`;
    }).join('') +
    (activeTools ? `<button class="filter-chip" style="font-size:10px;padding:2px 6px;margin:1px;color:var(--red)" onclick="clearToolFilter()">✕ Clear</button>` : '');
}
function toggleToolFilter(name) {
  if (!activeTools) activeTools = new Set();
  if (activeTools.has(name)) { activeTools.delete(name); if (activeTools.size === 0) activeTools = null; }
  else activeTools.add(name);
  applyFilter();
}
function clearToolFilter() { activeTools = null; applyFilter(); }

function setSidebarOrderMode(mode) {
  if (!SIDEBAR_ORDER_MODES.includes(mode)) return;
  if (sidebarOrderMode === mode) return;
  sidebarOrderMode = mode;
  safeLocalStorageSet('claude-tap-sidebar-order', mode);
  updateSidebarSortControls();
  renderSidebar(true);
  updatePositionIndicator();
  if (virtualMode && activeIdx >= 0) {
    vsScrollToIdx(activeIdx);
  } else {
    const activeItem = document.querySelector('.sidebar-item.active');
    if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });
  }
}

function updateSidebarSortControls() {
  document.querySelectorAll('.sidebar-sort-btn').forEach(btn => {
    const mode = btn.dataset.sortMode;
    btn.textContent = mode === 'turn' ? t('sort_turn') : mode === 'session' ? t('sort_session') : t('sort_model');
    const active = mode === sidebarOrderMode;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
}

/* ─── Search ─── */
function onSearch(value) {
  searchQuery = value.toLowerCase().trim();
  $('#search-clear').style.display = searchQuery ? '' : 'none';
  applyFilter();
}
function clearSearch() {
  searchQuery = '';
  $('#search-input').value = '';
  $('#search-clear').style.display = 'none';
  applyFilter();
}
function matchSearch(e, q) {
  if (e._isStub) {
    // In lazy mode: search metadata fields only (fast, no parsing)
    const model = e.request?.body?.model || '';
    if (model.toLowerCase().includes(q)) return true;
    const path = e.request?.path || '';
    if (path.toLowerCase().includes(q)) return true;
    const sys = e.request?.body?.system || '';
    if (sys.toLowerCase().includes(q)) return true;
    const turn = String(e.turn || '');
    if (turn.includes(q)) return true;
    const tools = e.request?.body?.tools || [];
    for (const td of tools) {
      if (toolDisplayName(td).toLowerCase().includes(q)) return true;
    }
    const rc = e.response?.body?.content;
    if (Array.isArray(rc)) {
      for (const block of rc) {
        if ((block.name || '').toLowerCase().includes(q)) return true;
      }
    }
    return false;
  }
  const body = e.request?.body;
  if ((body?.model || '').toLowerCase().includes(q)) return true;
  const sys = extractSystem(body) || '';
  if (sys.toLowerCase().includes(q)) return true;
  const msgs = getMessages(body);
  for (const m of msgs) {
    const mc = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
    if (mc.toLowerCase().includes(q)) return true;
  }
  const tools = getRequestTools(body);
  for (const td of tools) {
    if (toolDisplayName(td).toLowerCase().includes(q)) return true;
    if (toolDescription(td).toLowerCase().includes(q)) return true;
  }
  const ro = getResponseOutput(e);
  const rc = ro?.content;
  if (Array.isArray(rc)) {
    for (const block of rc) {
      if ((block.text || block.name || '').toLowerCase().includes(q)) return true;
    }
  }
  return false;
}

/* ─── Global search (Cmd/Ctrl+F) ─── */
function initGlobalSearch() {
  const input = $('#global-search-input');
  $('#global-search-prev').onclick = () => navigateGlobalSearch(-1);
  $('#global-search-next').onclick = () => navigateGlobalSearch(1);
  $('#global-search-close').onclick = () => closeGlobalSearch();
  input.addEventListener('input', () => {
    globalSearchState.query = input.value.trim();
    scheduleGlobalSearchRecalc();
  });
}

function openGlobalSearch() {
  normalizeFiltersForGlobalSearch();
  globalSearchState.open = true;
  $('#global-search-overlay').classList.add('open');
  const input = $('#global-search-input');
  input.value = globalSearchState.query;
  input.focus();
  input.select();
  recalcGlobalSearchMatches();
}

function closeGlobalSearch() {
  globalSearchState.open = false;
  globalSearchState.query = '';
  globalSearchState.queries = [];
  globalSearchState.matchCounts = [];
  globalSearchState.totalMatches = 0;
  globalSearchState.currentMatch = -1;
  if (globalSearchState.recalcTimer) {
    cancelAnimationFrame(globalSearchState.recalcTimer);
    globalSearchState.recalcTimer = 0;
  }
  $('#global-search-input').value = '';
  $('#global-search-overlay').classList.remove('open');
  clearGlobalSearchHighlights($('#detail'));
  updateGlobalSearchCount();
}

function normalizeFiltersForGlobalSearch() {
  // Global search must be able to move across all entries.
  let changed = false;
  const allPaths = new Set(entries.map(getPath));
  if (activePaths.size !== allPaths.size) { activePaths = allPaths; changed = true; }
  if (activeTools) { activeTools = null; changed = true; }
  if (searchQuery) {
    searchQuery = '';
    if ($('#search-input')) $('#search-input').value = '';
    if ($('#search-clear')) $('#search-clear').style.display = 'none';
    changed = true;
  }
  if (changed) applyFilter(true);
}

function uniqueSearchQueries(values) {
  const out = [];
  const seen = new Set();
  values.forEach(value => {
    const q = String(value || '').toLowerCase();
    if (!q || seen.has(q)) return;
    seen.add(q);
    out.push(q);
  });
  return out;
}

function buildGlobalSearchQueries(query) {
  const base = String(query || '').toLowerCase().trim();
  if (!base) return [];
  const variants = [base];
  const keyMatch = base.match(/^([a-z0-9_$.-]+):(\s*.*)$/i);
  if (keyMatch) {
    const key = keyMatch[1];
    const tail = keyMatch[2] || '';
    const compactTail = tail.trimStart();
    variants.push(`"${key}":${compactTail}`);
    variants.push(`"${key}":${tail}`);
    variants.push(`"${key}": ${compactTail}`);
    variants.push(`${key}":${compactTail}`);
    variants.push(`${key}":${tail}`);
    variants.push(`${key}": ${compactTail}`);
  }
  variants.slice().forEach(value => {
    if (value.includes('"')) variants.push(value.replaceAll('"', '\\"'));
  });
  return uniqueSearchQueries(variants);
}

function buildGlobalHighlightQueries(query) {
  const base = String(query || '').toLowerCase().trim();
  if (!base) return [];
  const variants = buildGlobalSearchQueries(base);
  const keyMatch = base.match(/^([a-z0-9_$.-]+):(\s*.*)$/i);
  if (keyMatch) {
    const key = keyMatch[1];
    variants.push(`"${key}"`, key);
  }
  return uniqueSearchQueries(variants);
}

function getEntrySearchText(entry) {
  if (!entry?.request_id) return '';
  if (globalSearchState.textCache.has(entry.request_id)) return globalSearchState.textCache.get(entry.request_id);
  if (entry._isStub) {
    const lines = getRawLines();
    const raw = lines[entry._rawIdx] || '';
    const text = raw.toLowerCase();
    globalSearchState.textCache.set(entry.request_id, text);
    return text;
  }
  const resolved = entry;
  const body = resolved.request?.body;
  const parts = [];
  parts.push(body?.model || '');
  parts.push(extractSystem(body) || '');
  getMessages(body).forEach(m => parts.push(msgToText(m)));
  getRequestTools(body).forEach(td => parts.push(JSON.stringify(td)));
  const output = getResponseOutput(resolved);
  if (output?.content) parts.push(msgToText({ role: 'assistant', content: output.content }));
  getResponseEvents(resolved).forEach(ev => parts.push(JSON.stringify(ev)));
  parts.push(JSON.stringify(resolved, null, 2));
  const text = parts.join('\n').toLowerCase();
  globalSearchState.textCache.set(entry.request_id, text);
  return text;
}

function countOneQueryInText(text, query) {
  let count = 0;
  let from = 0;
  while (query) {
    const idx = text.indexOf(query, from);
    if (idx === -1) return count;
    count += 1;
    from = idx + query.length;
  }
  return count;
}

function countMatchesInText(text, queries) {
  if (!text || !queries.length) return 0;
  return Math.max(...queries.map(query => countOneQueryInText(text, query)));
}

function scheduleGlobalSearchRecalc() {
  if (globalSearchState.recalcTimer) cancelAnimationFrame(globalSearchState.recalcTimer);
  globalSearchState.recalcTimer = requestAnimationFrame(() => {
    globalSearchState.recalcTimer = 0;
    recalcGlobalSearchMatches();
  });
}

function flushGlobalSearchRecalc() {
  if (!globalSearchState.recalcTimer) return;
  cancelAnimationFrame(globalSearchState.recalcTimer);
  globalSearchState.recalcTimer = 0;
  recalcGlobalSearchMatches();
}

function recalcGlobalSearchMatches() {
  clearGlobalSearchHighlights($('#detail'));
  const queries = buildGlobalSearchQueries(globalSearchState.query);
  globalSearchState.queries = queries;
  if (!queries.length) {
    globalSearchState.matchCounts = [];
    globalSearchState.totalMatches = 0;
    globalSearchState.currentMatch = -1;
    updateGlobalSearchCount();
    return;
  }
  const counts = [];
  let total = 0;
  entries.forEach(entry => {
    const c = countMatchesInText(getEntrySearchText(entry), queries);
    if (c > 0) counts.push({ requestId: entry.request_id, count: c });
    total += c;
  });
  globalSearchState.matchCounts = counts;
  globalSearchState.totalMatches = total;
  globalSearchState.currentMatch = total > 0 ? 0 : -1;
  updateGlobalSearchCount();
  revealCurrentSearchMatch();
}

function updateGlobalSearchCount() {
  const total = globalSearchState.totalMatches;
  const current = total > 0 ? (globalSearchState.currentMatch + 1) : 0;
  const label = total > 0 ? `${current} of ${total} matches` : '0 of 0';
  $('#global-search-count').textContent = label;
}

function getTargetForGlobalMatch(globalIndex) {
  let seen = 0;
  for (const row of globalSearchState.matchCounts) {
    if (globalIndex < seen + row.count) {
      return { requestId: row.requestId, localIndex: globalIndex - seen };
    }
    seen += row.count;
  }
  return null;
}

function findFilteredIdxByRequestId(requestId) {
  return filtered.findIndex(entry => entry.request_id === requestId);
}

function ensureEntryVisibleForSearch(requestId) {
  let idx = findFilteredIdxByRequestId(requestId);
  if (idx < 0) {
    normalizeFiltersForGlobalSearch();
    idx = findFilteredIdxByRequestId(requestId);
  }
  if (idx < 0) return -1;
  const model = filtered[idx]?.request?.body?.model || 'unknown';
  if (collapsedGroups.has(model)) {
    collapsedGroups.delete(model);
    renderSidebar(true);
    idx = findFilteredIdxByRequestId(requestId);
  }
  return idx;
}

function navigateGlobalSearch(delta) {
  flushGlobalSearchRecalc();
  if (!globalSearchState.totalMatches) return;
  const total = globalSearchState.totalMatches;
  globalSearchState.currentMatch = (globalSearchState.currentMatch + delta + total) % total;
  updateGlobalSearchCount();
  revealCurrentSearchMatch();
}

function revealCurrentSearchMatch() {
  const target = getTargetForGlobalMatch(globalSearchState.currentMatch);
  if (!target) return;
  const filteredIdx = ensureEntryVisibleForSearch(target.requestId);
  if (filteredIdx < 0) return;
  const sameEntry = currentDetailRequestId === target.requestId;
  selectEntry(filteredIdx, { force: !sameEntry });
  applyGlobalSearchHighlights(target.localIndex);
}

function applyGlobalSearchHighlights(targetLocalIndex) {
  const detail = $('#detail');
  if (!detail) return;
  clearGlobalSearchHighlights(detail);
  const queries = buildGlobalHighlightQueries(globalSearchState.query);
  if (!queries.length) return;
  const marks = highlightSearchInContainer(detail, queries);
  autoExpandSearchMatches(marks);
  if (!marks.length) return;
  let idx = targetLocalIndex;
  if (idx < 0 || idx >= marks.length) idx = 0;
  marks.forEach((mark, i) => mark.classList.toggle('current', i === idx));
  marks[idx].scrollIntoView({ block: 'center' });
}

function clearGlobalSearchHighlights(container) {
  if (!container) return;
  container.querySelectorAll('mark.global-search-hit').forEach(mark => {
    mark.replaceWith(document.createTextNode(mark.textContent || ''));
  });
  container.normalize();
}

function findNextSearchMatch(text, queries, from) {
  let best = null;
  queries.forEach(query => {
    const idx = text.indexOf(query, from);
    if (idx === -1) return;
    if (!best || idx < best.index || (idx === best.index && query.length > best.query.length)) {
      best = { index: idx, query };
    }
  });
  return best;
}

function highlightSearchInContainer(container, queries) {
  if (!queries.length) return [];
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      const parent = node.parentElement;
      if (!parent) return NodeFilter.FILTER_REJECT;
      if (parent.closest('#global-search-overlay')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    },
  });
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);
  const marks = [];
  textNodes.forEach(node => {
    const value = node.nodeValue;
    const lower = value.toLowerCase();
    let from = 0;
    let found = findNextSearchMatch(lower, queries, from);
    if (!found) return;
    const frag = document.createDocumentFragment();
    while (found) {
      if (found.index > from) frag.appendChild(document.createTextNode(value.slice(from, found.index)));
      const mark = document.createElement('mark');
      mark.className = 'global-search-hit';
      mark.textContent = value.slice(found.index, found.index + found.query.length);
      frag.appendChild(mark);
      marks.push(mark);
      from = found.index + found.query.length;
      found = findNextSearchMatch(lower, queries, from);
    }
    if (from < value.length) frag.appendChild(document.createTextNode(value.slice(from)));
    node.parentNode.replaceChild(frag, node);
  });
  return marks;
}

function autoExpandSearchMatches(marks) {
  marks.forEach(mark => {
    const sectionBody = mark.closest('.section-body');
    if (sectionBody && !sectionBody.classList.contains('open')) {
      sectionBody.classList.add('open');
      sectionBody.previousElementSibling?.querySelector('.chevron')?.classList.add('open');
    }
    const toolBody = mark.closest('.tool-block-body');
    if (toolBody && !toolBody.classList.contains('open')) {
      toolBody.classList.add('open');
      toolBody.previousElementSibling?.querySelector('.tb-arrow')?.classList.add('open');
    }
  });
}

/* ─── Model helpers ─── */
function modelPriority(m) {
  const l = m.toLowerCase();
  if (l.includes('opus')) return 0;
  if (l.includes('sonnet')) return 1;
  if (l.includes('haiku')) return 3;
  return 2;
}
function compareSidebarModelOrder(a, b) {
  const ma = a.request?.body?.model || 'unknown';
  const mb = b.request?.body?.model || 'unknown';
  const pa = modelPriority(ma), pb = modelPriority(mb);
  if (pa !== pb) return pa - pb;
  const modelDiff = ma.localeCompare(mb);
  if (modelDiff) return modelDiff;
  return compareTurns(a.turn, b.turn);
}
function modelColor(m) {
  const l = m.toLowerCase();
  if (l.includes('opus')) return 'var(--purple)';
  if (l.includes('sonnet')) return 'var(--blue)';
  if (l.includes('haiku')) return 'var(--green)';
  return 'var(--text-tertiary)';
}
function modelBadge(m) {
  const l = m.toLowerCase();
  if (l.includes('opus')) return { bg: 'var(--purple-bg)', fg: 'var(--purple)' };
  if (l.includes('sonnet')) return { bg: 'var(--blue-bg)', fg: 'var(--blue)' };
  if (l.includes('haiku')) return { bg: 'var(--green-bg)', fg: 'var(--green)' };
  return { bg: 'var(--bg)', fg: 'var(--text-tertiary)' };
}

function sessionTextSnippet(text, maxLen = 56) {
  const normalized = String(text || '').replace(/\s+/g, ' ').trim();
  if (normalized.length <= maxLen) return normalized;
  return normalized.slice(0, Math.max(0, maxLen - 3)).trimEnd() + '...';
}

function naturalTextFromPromptPayload(payload) {
  if (typeof payload === 'string') return cleanUserPromptText(payload);
  if (Array.isArray(payload)) {
    for (const item of payload) {
      const text = naturalTextFromPromptPayload(item);
      if (text) return text;
    }
    return '';
  }
  if (!payload || typeof payload !== 'object') return '';
  for (const key of ['prompt', 'request', 'instruction', 'message', 'query', 'text', 'title']) {
    if (typeof payload[key] !== 'string') continue;
    const text = cleanUserPromptText(payload[key]);
    if (text) return text;
  }
  if (payload.content !== undefined) return naturalTextForSessionContent(payload.content);
  return '';
}

function cleanUserPromptText(text) {
  let value = String(text || '').trim();
  if (!value) return '';
  if (value.length >= 2 && value[0] === '"' && value[value.length - 1] === '"') {
    try {
      const decoded = JSON.parse(value);
      if (typeof decoded === 'string' && decoded.trim()) value = decoded.trim();
    } catch (_) {
      // Keep the original text when it only looks JSON-quoted.
    }
  }
  if (/^[{[]/.test(value)) {
    try {
      const decoded = JSON.parse(value);
      const prompt = naturalTextFromPromptPayload(decoded);
      if (prompt) return prompt;
    } catch (_) {
      // Keep scanning the original text when it only looks like JSON.
    }
  }
  const userRequest = value.match(/<USER_REQUEST>\s*([\s\S]*?)\s*<\/USER_REQUEST>/i);
  if (userRequest) return userRequest[1].trim();
  const session = value.match(/^<session>\s*([\s\S]*?)\s*<\/session>$/i);
  if (session) return session[1].trim();
  const firstTag = value.match(/^<([A-Za-z_-]+)>/);
  const injectedTags = new Set([
    'artifacts',
    'environment_context',
    'local-command-caveat',
    'session_context',
    'skills',
    'slash_commands',
    'subagents',
    'system-reminder',
    'user_information',
  ]);
  if (firstTag && injectedTags.has(firstTag[1].toLowerCase())) return '';
  if (/^<\/?image(_input)?(\s+[^>]*)?>$/i.test(value)) return '';
  if (/^\[SUGGESTION MODE:/i.test(value)) return '';
  if (/^(web page content|page content|网页内容)\s*[:：]/i.test(value)) return '';
  if (/^\[Image:\s*source:/i.test(value)) return '';
  return value.replace(/^\[Image #\d+\]\s*/i, '').trim();
}

function imageLookupKey(text) {
  let value = String(text || '').trim();
  const session = value.match(/^<session>\s*([\s\S]*?)\s*<\/session>$/i);
  if (session) value = session[1].trim();
  return value.replace(/^\[Image #\d+\]\s*/i, '').trim();
}

let sessionTooltipEl = null;
function sessionTooltip() {
  if (sessionTooltipEl) return sessionTooltipEl;
  sessionTooltipEl = document.createElement('div');
  sessionTooltipEl.id = 'session-full-input-tooltip';
  sessionTooltipEl.className = 'session-hover-tooltip';
  document.body.appendChild(sessionTooltipEl);
  return sessionTooltipEl;
}

function positionSessionTooltip(trigger, tooltip) {
  const rect = trigger.getBoundingClientRect();
  let left = rect.right + 10;
  let maxWidth = Math.min(520, window.innerWidth - left - 12);
  if (maxWidth < 240) {
    left = 12;
    maxWidth = Math.max(180, window.innerWidth - 24);
  }
  tooltip.style.width = maxWidth + 'px';
  tooltip.style.left = left + 'px';
  tooltip.style.top = '0px';
  const desiredTop = rect.top;
  const height = tooltip.offsetHeight || 0;
  const top = Math.max(12, Math.min(desiredTop, window.innerHeight - height - 12));
  tooltip.style.top = top + 'px';
}

function showSessionTooltip(trigger) {
  const fullText = trigger?.dataset?.fullUserInput || '';
  if (!fullText) return;
  const tooltip = sessionTooltip();
  tooltip.textContent = fullText;
  tooltip.classList.add('visible');
  trigger.setAttribute('aria-describedby', tooltip.id);
  positionSessionTooltip(trigger, tooltip);
}

function hideSessionTooltip(trigger) {
  if (!sessionTooltipEl) return;
  sessionTooltipEl.classList.remove('visible');
  if (trigger) trigger.removeAttribute('aria-describedby');
}

function bindSessionInputTooltip(header, fullText, snippet) {
  const original = String(fullText || '').trim();
  if (!original || !snippet.endsWith('...')) return;
  header.dataset.fullUserInput = original;
  header.tabIndex = 0;
  header.addEventListener('mouseenter', () => showSessionTooltip(header));
  header.addEventListener('focus', () => showSessionTooltip(header));
  header.addEventListener('mouseleave', () => hideSessionTooltip(header));
  header.addEventListener('blur', () => hideSessionTooltip(header));
}

function naturalTextForSessionContent(content) {
  if (content === undefined || content === null) return '';
  if (typeof content === 'string') return cleanUserPromptText(content);
  if (!Array.isArray(content)) {
    if (typeof content === 'object') {
      if (content.type === 'tool_result' || content.type === 'function_call_output') return '';
      if (typeof content.text === 'string') return cleanUserPromptText(content.text);
      if (typeof content.output === 'string') return cleanUserPromptText(content.output);
      if (content.content !== undefined) return naturalTextForSessionContent(content.content);
    }
    return '';
  }
  for (const block of content) {
    let text = '';
    if (typeof block === 'string') {
      text = block;
    } else if (block && typeof block === 'object') {
      if (block.type === 'tool_result' || block.type === 'function_call_output') continue;
      if (block.type === 'text' || block.type === 'input_text' || block.type === 'output_text') text = block.text || '';
      else if (block.type === 'message') text = naturalTextForSessionContent(block.content);
      else if (typeof block.text === 'string') text = block.text;
      else if (typeof block.output === 'string') text = block.output;
    }
    const prompt = cleanUserPromptText(text);
    if (prompt) return prompt;
  }
  return '';
}

function contentTextForSession(content) {
  if (content === undefined || content === null) return '';
  if (typeof content === 'string') return content.trim();
  if (!Array.isArray(content)) {
    if (typeof content === 'object') {
      if (typeof content.text === 'string') return content.text.trim();
      if (typeof content.output === 'string') return content.output.trim();
      if (content.content !== undefined) return contentTextForSession(content.content);
    }
    return '';
  }
  return content.map(block => {
    if (!block || typeof block !== 'object') return String(block || '').trim();
    if (block.type === 'text' || block.type === 'input_text' || block.type === 'output_text') return block.text || '';
    if (block.type === 'message') return contentTextForSession(block.content);
    if (block.type === 'thinking') return block.thinking || '';
    if (block.type === 'tool_use' || block.type === 'function_call') return `[${block.name || block.type}]`;
    if (block.type === 'tool_result') return contentTextForSession(block.content);
    if (block.type === 'function_call_output') return block.output || '';
    if (typeof block.text === 'string') return block.text;
    if (typeof block.output === 'string') return block.output;
    return '';
  }).filter(Boolean).join('\n').trim();
}

function isToolResultOnlyMessage(message) {
  const content = message?.content;
  if (!Array.isArray(content) || content.length === 0) return false;
  return content.every(block => block && typeof block === 'object'
    && (block.type === 'tool_result' || block.type === 'function_call_output'));
}

function latestUserInputText(entry) {
  return latestUserInputInfo(entry).userText;
}

function latestUserInputInfo(entry) {
  const msgs = getMessages(entry?.request?.body);
  for (let i = msgs.length - 1; i >= 0; i--) {
    const message = msgs[i];
    if (message?.role !== 'user' || isToolResultOnlyMessage(message)) continue;
    const text = naturalTextForSessionContent(message.content);
    if (text) return { userText: text, userIndex: i, messageCount: msgs.length };
  }
  return { userText: '', userIndex: -1, messageCount: msgs.length };
}

function finalResponseText(entry) {
  const output = getResponseOutput(entry);
  const outputText = contentTextForSession(output?.content);
  if (outputText) return outputText;
  const payload = getResponsePayload(entry);
  return contentTextForSession(payload?.output || payload?.content || payload?.message || payload);
}

function isContinuationWithoutUserInput(entry) {
  if (previousResponseIdForDiff(entry)) return true;
  const input = entry?.request?.body?.input;
  return Array.isArray(input) && input.length > 0 && input.every(isResponseToolResultItem);
}

function isTitleGenerationEntry(entry) {
  const sys = extractSystem(entry?.request?.body) || '';
  return /generate a concise/i.test(sys) && /single\s+"title"\s+field/i.test(sys);
}

function sessionRootTurn(entry) {
  const rootTurn = parseInt(String(entry?.turn ?? '').split('.')[0], 10);
  return isNaN(rootTurn) ? null : rootTurn;
}

function shouldContinueSessionGroup(entry, info, currentGroup) {
  if (!currentGroup || !info.userText || currentGroup.userText !== info.userText) return false;
  if (isTitleGenerationEntry(entry)) return false;
  if (currentGroup.metadataOnly) return true;
  if (info.messageCount > 1 && info.userIndex === currentGroup.userIndex) return true;
  return false;
}

function sessionKeyForEntry(entry, currentGroup) {
  const info = latestUserInputInfo(entry);
  const metadataOnly = isTitleGenerationEntry(entry);
  const rootTurn = sessionRootTurn(entry);
  if (info.userText) {
    if (shouldContinueSessionGroup(entry, info, currentGroup)) {
      return { key: currentGroup.key, userText: info.userText, userIndex: info.userIndex, metadataOnly, rootTurn };
    }
    return {
      key: 'user:' + sessionTurnDiscriminator(entry) + ':' + info.userIndex + ':' + info.userText,
      userText: info.userText,
      userIndex: info.userIndex,
      metadataOnly,
      rootTurn,
    };
  }
  if (currentGroup) return { key: currentGroup.key, userText: '', userIndex: currentGroup.userIndex, metadataOnly, rootTurn };
  const rootTurnText = String(entry?.turn ?? '').split('.')[0];
  if (rootTurnText) return { key: 'turn:' + rootTurnText, userText: '', userIndex: -1, metadataOnly, rootTurn };
  return { key: 'request:' + (entry?.request_id || ''), userText: '', userIndex: -1, metadataOnly, rootTurn: null };
}

function sessionTurnDiscriminator(entry) {
  const rootTurn = String(entry?.turn ?? '').split('.')[0];
  if (rootTurn) return 'turn:' + rootTurn;
  return 'request:' + (entry?.request_id || '');
}

function buildSessionGroups(items) {
  const groups = [];
  const titleGenerationItems = [];

  function createGroup(info, item) {
    const group = {
      key: info.key,
      userText: info.userText,
      userIndex: info.userIndex,
      metadataOnly: !!info.metadataOnly,
      rootTurn: info.rootTurn,
      firstOrder: item.order,
      responseText: '',
      items: [],
    };
    groups.push(group);
    return group;
  }

  function addItemToGroup(group, item, info) {
    if (!group.userText && info.userText) {
      group.userText = info.userText;
      group.userIndex = info.userIndex;
    }
    if (group.rootTurn == null && info.rootTurn != null) group.rootTurn = info.rootTurn;
    if (!info.metadataOnly) group.metadataOnly = false;
    const responseText = finalResponseText(item.entry);
    if (responseText) group.responseText = responseText;
    group.items.push(item);
  }

  function bestTitleGenerationGroup(item, info) {
    let best = null;
    groups.forEach(group => {
      if (info.userText && group.userText && info.userText !== group.userText) return;
      let distance;
      if (info.rootTurn != null && group.rootTurn != null) {
        distance = Math.abs(info.rootTurn - group.rootTurn);
        if (distance > 2) return;
      } else {
        distance = Math.abs(item.order - group.firstOrder);
      }
      const futurePenalty = item.order < group.firstOrder ? 0.25 : 0;
      const score = distance + futurePenalty;
      if (!best || score < best.score) best = { group, score };
    });
    return best ? best.group : null;
  }

  items.forEach((rawItem, order) => {
    const item = { ...rawItem, order };
    if (isTitleGenerationEntry(item.entry)) {
      titleGenerationItems.push(item);
      return;
    }
    const current = groups[groups.length - 1] || null;
    const info = sessionKeyForEntry(item.entry, current);
    let group = current && current.key === info.key ? current : null;
    if (!group) group = createGroup(info, item);
    addItemToGroup(group, item, info);
  });

  titleGenerationItems.forEach(item => {
    const info = sessionKeyForEntry(item.entry, null);
    const group = bestTitleGenerationGroup(item, info) || createGroup(info, item);
    addItemToGroup(group, item, info);
  });

  groups.forEach(group => {
    group.items.sort((a, b) => a.order - b.order);
  });
  return groups;
}

function sidebarItemsForMode() {
  const items = filtered.map((entry, idx) => ({ entry, idx }));
  if (sidebarOrderMode === 'model') return items.sort((a, b) => compareSidebarModelOrder(a.entry, b.entry));
  if (sidebarOrderMode === 'session') return buildSessionGroups(items).flatMap(group => group.items);
  return items;
}

/* ─── Visual order helpers ─── */
function buildVisualOrder() {
  if (virtualMode) {
    visualOrder = vsFilteredItems.map(item => item.idx);
    return;
  }
  visualOrder = [];
  document.querySelectorAll('.sidebar-item').forEach(el => {
    // Skip items whose parent container is collapsed (display: none)
    if (el.parentElement && el.parentElement.style.display === 'none') return;
    visualOrder.push(parseInt(el.dataset.idx));
  });
}

function visualNavigate(delta) {
  if (!visualOrder.length) return;
  const pos = visualOrder.indexOf(activeIdx);
  if (pos === -1) { selectEntry(visualOrder[0]); return; }
  const next = Math.max(0, Math.min(pos + delta, visualOrder.length - 1));
  selectEntry(visualOrder[next]);
}

/* ─── Sidebar ─── */
const collapsedGroups = new Set(); // Track collapsed model groups

/* ─── Task type fingerprinting ─── */
const TASK_COLORS = [
  { color: 'var(--blue)',   bg: 'var(--blue-bg)' },
  { color: 'var(--green)',  bg: 'var(--green-bg)' },
  { color: 'var(--purple)', bg: 'var(--purple-bg)' },
  { color: 'var(--amber)',  bg: 'var(--amber-bg)' },
  { color: 'var(--cyan)',   bg: 'var(--cyan-bg)' },
  { color: 'var(--orange)', bg: 'var(--orange-bg)' },
  { color: 'var(--red)',    bg: 'var(--red-bg)' },
  { color: 'var(--indigo)', bg: 'var(--purple-bg)' },
];
const taskFingerprintCache = new Map();

function getTaskFingerprint(e) {
  const rid = e.request_id;
  if (taskFingerprintCache.has(rid)) return taskFingerprintCache.get(rid);
  const body = e.request?.body;
  if (!body) { taskFingerprintCache.set(rid, null); return null; }
  // Extract full system prompt text
  let sysText = '';
  if (typeof body.system === 'string') sysText = body.system;
  else if (Array.isArray(body.system)) {
    sysText = body.system.map(s => typeof s === 'string' ? s : (s.text || '')).join('\n');
  } else if (typeof body.instructions === 'string') {
    sysText = body.instructions;
  } else if (Array.isArray(body.messages)) {
    // OpenAI chat-completions schema: system prompt lives in messages[0..n] with role="system"
    sysText = body.messages
      .filter(m => m && m.role === 'system')
      .map(m => typeof m.content === 'string' ? m.content : (Array.isArray(m.content) ? m.content.map(c => c?.text || '').join('\n') : ''))
      .join('\n');
  }
  // Tool names sorted for stable fingerprint
  const tools = body.tools || [];
  const toolKey = tools.map(toolDisplayName).sort().join(',');
  // Build fingerprint from full system prompt + tool set
  const fp = sysText + '|' + toolKey;
  // Derive a short label from system prompt content
  const lower = sysText.toLowerCase();
  let label = '';
  if (!sysText && !tools.length) label = 'simple';
  // Self-identification phrases ("You are X") win over generic substring matches,
  // since other agents may mention "Claude Code" inside their own prompt body.
  else if (lower.includes('you are opencode')) label = 'OpenCode';
  else if (lower.includes('you are hermes')) label = 'Hermes';
  else if (lower.includes('you are codex')) label = 'Codex';
  else if (lower.includes('operating inside pi') || lower.includes('pi, a coding agent harness')) label = 'Pi';
  else if (lower.includes('claude code')) label = 'Claude Code';
  else if (lower.includes('claude agent')) label = 'Claude Agent';
  else if (lower.includes('openclaw')) label = 'OpenClaw';
  else if (lower.includes('subagent') || lower.includes('sub-agent')) label = 'Subagent';
  else if (lower.includes('bash')) label = 'Bash';
  else if (lower.includes('explore')) label = 'Explore';
  else if (lower.includes('plan')) label = 'Plan';
  else if (sysText) {
    const firstLine = sysText.split('\n').find(l => {
      const line = l.trim().toLowerCase();
      return line && !line.startsWith('x-anthropic-billing-header:');
    }) || '';
    label = firstLine.slice(0, 20).trim() || (tools.length + ' tools');
  } else {
    label = tools.length + ' tools';
  }
  const result = { fp, label };
  taskFingerprintCache.set(rid, result);
  return result;
}

function getTaskColor(fp) {
  if (!fp) return TASK_COLORS[0];
  // Hash with sampling for long strings (system prompts can be very large)
  let hash = 0;
  const step = fp.length > 1000 ? Math.floor(fp.length / 500) : 1;
  for (let i = 0; i < fp.length; i += step) hash = ((hash << 5) - hash + fp.charCodeAt(i)) | 0;
  hash = ((hash << 5) - hash + fp.length) | 0; // include length for extra differentiation
  return TASK_COLORS[Math.abs(hash) % TASK_COLORS.length];
}

function createSidebarItem(e, i) {
  const item = document.createElement('div');
  const statusCode = getResponseStatus(e);
  const failed = statusCode >= 400;
  item.className = 'sidebar-item' + (failed ? ' is-error' : '');
  item.dataset.idx = i;
  const u = getUsage(e);
  const inTok = u?.input_tokens || 0, outTok = u?.output_tokens || 0;
  const model = e.request?.body?.model || '';
  const shortModel = model.replace(/^claude-/, '').replace(/-\d{8}$/, '');
  const badge = modelBadge(model);
  const timeStr = e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : '';
  // Task type coloring
  const taskInfo = getTaskFingerprint(e);
  const taskColor = taskInfo ? getTaskColor(taskInfo.fp) : TASK_COLORS[0];
  item.style.borderLeftColor = failed ? 'var(--red)' : taskColor.color;
  const taskBadgeHtml = taskInfo && taskInfo.label ? `<span class="si-task" style="background:${taskColor.bg};color:${taskColor.color}" title="${esc(taskInfo.label)}">${esc(taskInfo.label)}</span>` : '';
  const errorDot = failed ? `<span class="si-error-dot" title="HTTP ${statusCode}"></span>` : '';
  item.innerHTML = `
    <div class="si-row1">
      <span class="si-turn-wrap"><span class="si-turn">${t('turn')} ${e.turn || '?'}</span>${errorDot}</span>
      ${taskBadgeHtml}
      <span class="si-model" style="background:${badge.bg};color:${badge.fg}">${esc(shortModel)}</span>
    </div>
    <div class="si-row2">
      <span class="si-tok">${(inTok + outTok).toLocaleString()} ${t('tok')}</span>
      <span class="si-dur">${fmtDuration(e.duration_ms || 0)}</span>
      <span class="si-time">${esc(timeStr)}</span>
    </div>
    <div class="si-path">${esc((e.request?.method || '') + ' ' + (e.request?.path || ''))}</div>`;
  item.onclick = () => selectEntry(i);
  return item;
}

function renderSidebar(preserveDetail) {
  const sb = $('#sidebar');
  const prevScrollTop = sb.scrollTop;
  updateSidebarSortControls();

  // Use virtual scroll for large filtered sets
  if (filtered.length > LAZY_THRESHOLD) {
    virtualMode = true;
    sb.classList.add('virtual-scroll');
    vsFilteredItems = sidebarItemsForMode();
    visualOrder = vsFilteredItems.map(item => item.idx);
    vsInitSidebar(sb, prevScrollTop, preserveDetail);
    return;
  }

  // Standard DOM-based sidebar for small traces
  virtualMode = false;
  sb.classList.remove('virtual-scroll');
  sb.innerHTML = '';
  if (sidebarOrderMode === 'turn') {
    let lastTs = null;
    filtered.forEach((e, i) => {
      const gap = _timeGapHtml(e, lastTs);
      if (gap) sb.insertAdjacentHTML('beforeend', gap);
      lastTs = e.timestamp ? new Date(e.timestamp).getTime() : null;
      sb.appendChild(createSidebarItem(e, i));
    });
    buildVisualOrder();
    _restoreSelection(preserveDetail);
    if (preserveDetail) sb.scrollTop = prevScrollTop;
    return;
  }

  if (sidebarOrderMode === 'session') {
    const groups = buildSessionGroups(filtered.map((entry, idx) => ({ entry, idx })));
    groups.forEach((group, groupIdx) => {
      const firstEntry = group.items[0]?.entry;
      const taskInfo = firstEntry ? getTaskFingerprint(firstEntry) : null;
      const taskColor = taskInfo ? getTaskColor(taskInfo.fp) : TASK_COLORS[groupIdx % TASK_COLORS.length];
      const groupKey = 'session:' + groupIdx + ':' + group.key;
      const isCollapsed = collapsedGroups.has(groupKey);
      const label = sessionTextSnippet(group.userText, 48);
      const header = document.createElement('div');
      header.className = 'sidebar-group-header';
      header.innerHTML = `<span class="group-dot" style="background:${taskColor.color}"></span><span class="group-name">${esc(t('sort_session'))} ${groupIdx + 1}${label ? ' - ' + esc(label) : ''}</span><span class="group-count">${group.items.length}</span><span class="group-chevron${isCollapsed ? '' : ' open'}">&#9654;</span>`;
      bindSessionInputTooltip(header, group.userText, label);
      const content = document.createElement('div');
      if (isCollapsed) content.style.display = 'none';
      group.items.forEach(({ entry: e, idx: i }) => content.appendChild(createSidebarItem(e, i)));
      header.onclick = () => {
        hideSessionTooltip(header);
        const nowCollapsed = content.style.display !== 'none';
        content.style.display = nowCollapsed ? 'none' : '';
        header.querySelector('.group-chevron').classList.toggle('open');
        if (nowCollapsed) collapsedGroups.add(groupKey); else collapsedGroups.delete(groupKey);
        buildVisualOrder();
        updateMobileNav();
      };
      sb.appendChild(header);
      sb.appendChild(content);
    });
    buildVisualOrder();
    _restoreSelection(preserveDetail);
    if (preserveDetail) sb.scrollTop = prevScrollTop;
    return;
  }

  const groups = new Map();
  filtered.forEach((e, i) => {
    const model = e.request?.body?.model || 'unknown';
    if (!groups.has(model)) groups.set(model, []);
    groups.get(model).push({ entry: e, idx: i });
  });
  const sorted = [...groups.keys()].sort((a, b) => {
    const pa = modelPriority(a), pb = modelPriority(b);
    return pa !== pb ? pa - pb : a.localeCompare(b);
  });
  if (sorted.length <= 1) {
    // Insert time gap indicators between entries
    let lastTs = null;
    filtered.forEach((e, i) => {
      const gap = _timeGapHtml(e, lastTs);
      if (gap) sb.insertAdjacentHTML('beforeend', gap);
      lastTs = e.timestamp ? new Date(e.timestamp).getTime() : null;
      sb.appendChild(createSidebarItem(e, i));
    });
  } else {
    sorted.forEach(model => {
      const items = groups.get(model);
      const shortModel = model.replace(/^claude-/, '').replace(/-\d{8}$/, '');
      const color = modelColor(model);
      const isCollapsed = collapsedGroups.has(model);
      const header = document.createElement('div');
      header.className = 'sidebar-group-header';
      header.innerHTML = `<span class="group-dot" style="background:${color}"></span><span class="group-name">${esc(shortModel)}</span><span class="group-count">${items.length}</span><span class="group-chevron${isCollapsed ? '' : ' open'}">&#9654;</span>`;
      const content = document.createElement('div');
      if (isCollapsed) content.style.display = 'none';
      items.forEach(({ entry: e, idx: i }) => content.appendChild(createSidebarItem(e, i)));
      header.onclick = () => {
        const nowCollapsed = content.style.display !== 'none';
        content.style.display = nowCollapsed ? 'none' : '';
        header.querySelector('.group-chevron').classList.toggle('open');
        if (nowCollapsed) collapsedGroups.add(model); else collapsedGroups.delete(model);
        buildVisualOrder();
        updateMobileNav();
      };
      sb.appendChild(header);
      sb.appendChild(content);
    });
  }
  buildVisualOrder();
  _restoreSelection(preserveDetail);
  if (preserveDetail) sb.scrollTop = prevScrollTop;
}

function _restoreSelection(preserveDetail) {
  let restoredIdx = -1;
  if (preserveDetail && currentDetailRequestId) {
    restoredIdx = filtered.findIndex(e => e.request_id === currentDetailRequestId);
  }
  if (restoredIdx >= 0) {
    selectEntry(restoredIdx, { force: false });
  } else if (activeIdx >= 0 && activeIdx < filtered.length) {
    selectEntry(activeIdx, { force: !preserveDetail });
  } else if (filtered.length) {
    let defaultIdx = 0;
    for (let i = 0; i < filtered.length; i++) {
      const m = (filtered[i].request?.body?.model || '').toLowerCase();
      if (m.includes('opus') || m.includes('sonnet')) { defaultIdx = i; break; }
    }
    selectEntry(defaultIdx);
  } else {
    activeIdx = -1; $('#detail').innerHTML = `<div class="empty-state">${t('empty_state')}</div>`;
  }
}

/* ─── Time gap indicator ─── */
function _timeGapHtml(entry, lastTs) {
  if (!lastTs || !entry.timestamp) return '';
  const ts = new Date(entry.timestamp).getTime();
  const gapMs = ts - lastTs;
  if (gapMs < 60000) return ''; // less than 1 min
  let label;
  if (gapMs < 3600000) label = Math.round(gapMs / 60000) + ' min gap';
  else label = (gapMs / 3600000).toFixed(1) + ' hr gap';
  return `<div class="time-gap"><span class="tg-line"></span>${label}<span class="tg-line"></span></div>`;
}

/* ─── Position indicator ─── */
function updatePositionIndicator() {
  const pi = $('#position-indicator');
  if (!pi) return;
  if (!filtered.length || activeIdx < 0) {
    pi.style.display = 'none';
    return;
  }
  pi.style.display = 'flex';
  const entry = filtered[activeIdx];
  const turnNum = entry.turn || (activeIdx + 1);
  const pos = activeIdx + 1;
  const total = filtered.length;
  const pct = total > 1 ? ((pos - 1) / (total - 1)) * 100 : 0;
  $('#pi-current').textContent = turnNum;
  $('#pi-total').textContent = `of ${total}`;
  $('#pi-fill').style.width = pct + '%';
}

/* ─── Virtual scroll ─── */
let _vsRafPending = false;

function vsInitSidebar(sb, prevScrollTop, preserveDetail) {
  sb.innerHTML = '';
  const spacer = document.createElement('div');
  spacer.className = 'vs-spacer';
  spacer.style.height = (vsFilteredItems.length * VS_ITEM_HEIGHT) + 'px';
  sb.appendChild(spacer);

  // Throttled scroll handler
  sb.onscroll = () => {
    if (!_vsRafPending) {
      _vsRafPending = true;
      requestAnimationFrame(() => {
        _vsRafPending = false;
        vsRenderVisible();
      });
    }
  };

  if (preserveDetail) sb.scrollTop = prevScrollTop;
  vsRenderVisible();
  _restoreSelection(preserveDetail);
}

function vsRenderVisible() {
  const sb = $('#sidebar');
  if (!sb) return;
  const spacer = sb.querySelector('.vs-spacer');
  if (!spacer) return;

  const scrollTop = sb.scrollTop;
  const viewHeight = sb.clientHeight;
  const startIdx = Math.max(0, Math.floor(scrollTop / VS_ITEM_HEIGHT) - VS_BUFFER);
  const endIdx = Math.min(vsFilteredItems.length, Math.ceil((scrollTop + viewHeight) / VS_ITEM_HEIGHT) + VS_BUFFER);

  // Collect existing rendered items
  const existing = new Map();
  spacer.querySelectorAll('.sidebar-item').forEach(el => {
    existing.set(parseInt(el.dataset.idx), el);
  });

  const needed = new Set();
  for (let i = startIdx; i < endIdx; i++) {
    needed.add(vsFilteredItems[i].idx);
  }

  // Remove items no longer visible
  existing.forEach((el, idx) => {
    if (!needed.has(idx)) el.remove();
  });

  // Add missing items
  for (let i = startIdx; i < endIdx; i++) {
    const { entry, idx } = vsFilteredItems[i];
    if (existing.has(idx)) {
      // Update active state
      existing.get(idx).classList.toggle('active', idx === activeIdx);
      continue;
    }
    const item = createSidebarItem(entry, idx);
    item.style.position = 'absolute';
    item.style.top = (i * VS_ITEM_HEIGHT) + 'px';
    item.style.height = VS_ITEM_HEIGHT + 'px';
    item.classList.toggle('active', idx === activeIdx);
    spacer.appendChild(item);
  }
}

function vsScrollToIdx(idx) {
  const sb = $('#sidebar');
  if (!sb || !virtualMode) return;
  const pos = vsFilteredItems.findIndex(item => item.idx === idx);
  if (pos < 0) return;
  const itemTop = pos * VS_ITEM_HEIGHT;
  const itemBottom = itemTop + VS_ITEM_HEIGHT;
  if (itemTop < sb.scrollTop) {
    sb.scrollTop = itemTop;
  } else if (itemBottom > sb.scrollTop + sb.clientHeight) {
    sb.scrollTop = itemBottom - sb.clientHeight;
  }
}

function selectEntry(idx, opts) {
  if (idx < 0 || idx >= filtered.length) return;
  const force = !opts || opts.force !== false;
  activeIdx = idx;
  if (virtualMode) {
    vsRenderVisible();
  } else {
    document.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
    });
  }
  // Skip re-render if same entry and force=false (preserves scroll position in live mode)
  if (!force && currentDetailRequestId === filtered[idx].request_id) {
    // Just update sidebar highlight, keep detail as-is
  } else {
    const entry = filtered[idx];
    const resolved = entry._isStub ? getFullEntry(entry) : entry;
    renderDetail(resolved);
  }
  if (virtualMode) {
    vsScrollToIdx(idx);
  } else {
    const active = document.querySelector('.sidebar-item.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  }
  updatePositionIndicator();
  mobileShowDetail();
  updateMobileNav();
}

/* ─── Detail ─── */
// Persist section collapse state across turn switches.
// Key: section title text, Value: true = open, false = collapsed.
const sectionCollapseState = {};
let detailViewMode = 'default';
let traceFormatMode = 'json';

function saveSectionStates() {
  const d = $('#detail');
  if (!d) return;
  d.querySelectorAll('.section').forEach(sec => {
    const titleEl = sec.querySelector('.section-header .title');
    const bodyEl = sec.querySelector('.section-body');
    if (titleEl && bodyEl) {
      sectionCollapseState[titleEl.textContent] = bodyEl.classList.contains('open');
    }
  });
}

function restoreSectionStates() {
  const d = $('#detail');
  if (!d) return;
  d.querySelectorAll('.section').forEach(sec => {
    const titleEl = sec.querySelector('.section-header .title');
    const bodyEl = sec.querySelector('.section-body');
    const chevron = sec.querySelector('.chevron');
    if (!titleEl || !bodyEl || !chevron) return;
    const key = titleEl.textContent;
    if (key in sectionCollapseState) {
      const shouldBeOpen = sectionCollapseState[key];
      if (shouldBeOpen && !bodyEl.classList.contains('open')) {
        bodyEl.classList.add('open');
        chevron.classList.add('open');
      } else if (!shouldBeOpen && bodyEl.classList.contains('open')) {
        bodyEl.classList.remove('open');
        chevron.classList.remove('open');
      }
    }
  });
}

function setDetailViewMode(mode) {
  detailViewMode = mode;
  const entry = filtered[activeIdx];
  if (!entry) return;
  renderDetail(entry._isStub ? getFullEntry(entry) : entry);
}

function detailTabButton(mode, label) {
  const active = detailViewMode === mode;
  return `<button type="button" role="tab" aria-selected="${active ? 'true' : 'false'}" data-tab="${mode}" class="detail-tab ${active ? 'active' : ''}" onclick="setDetailViewMode('${mode}')"><span>${esc(label)}</span></button>`;
}

function renderDetailViewTabs() {
  return `<div class="detail-inspector-bar" role="tablist" aria-label="Detail view mode"><div class="detail-tabs">
